version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    reviewers:
      - "saturdaythings"
    assignees:
      - "saturdaythings"
    open-pull-requests-limit: 5
    rebase-strategy: "auto"
    commit-message:
      prefix: "chore(deps):"
      include: "scope"
