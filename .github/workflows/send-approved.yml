name: SDR Send Approved

on:
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * 1-5'  # 10:00 AM ET safety net

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Send approved emails
        env:
          OUTLOOK_TENANT_ID: ${{ secrets.OUTLOOK_TENANT_ID }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}
          OUTLOOK_CLIENT_SECRET: ${{ secrets.OUTLOOK_CLIENT_SECRET }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/send.js

      - name: Commit and push changes
        run: |
          git config user.email "oliver@vtwo.co"
          git config user.name "Oliver SDR Bot"
          git add -A
          git diff --staged --quiet || git commit -m "sent: approved emails dispatched"
          git push
