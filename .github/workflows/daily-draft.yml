name: SDR Daily Draft

on:
  schedule:
    - cron: '30 12 * * 1-5'  # 7:30 AM ET
  workflow_dispatch:

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/draft.js

      # approval-email.js wired in Chunk 4
      - name: Send approval email
        env:
          OUTLOOK_TENANT_ID: ${{ secrets.OUTLOOK_TENANT_ID }}
          OUTLOOK_CLIENT_ID: ${{ secrets.OUTLOOK_CLIENT_ID }}
          OUTLOOK_CLIENT_SECRET: ${{ secrets.OUTLOOK_CLIENT_SECRET }}
          APPROVAL_BASE_URL: "https://api.github.com/repos/saturdaythings/v-two-sdr/actions/workflows/approval-handler.yml/dispatches"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SDR_PAT: ${{ secrets.SDR_PAT }}
        run: echo "approval-email not yet built (Chunk 4)"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "drafts: generated"
