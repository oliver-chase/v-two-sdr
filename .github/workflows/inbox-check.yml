name: SDR Inbox Check

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 9:00 AM ET
    - cron: '0 20 * * 1-5'  # 3:00 PM ET
  workflow_dispatch:

jobs:
  inbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "hello from inbox-check"

      - name: Commit and push changes
        run: |
          git config user.email "oliver@vtwo.co"
          git config user.name "Oliver SDR Bot"
          git add -A
          git diff --staged --quiet || git commit -m "inbox: replies classified"
          git push
