name: SDR Weekly Prospecting

on:
  schedule:
    - cron: '0 1 * * 1'  # Sunday 8 PM ET (UTC-5 = Monday 01:00 UTC)
  workflow_dispatch:

jobs:
  prospect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Generate prospects
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/prospect.js

      - name: Commit and push changes
        run: |
          git config user.email "oliver@vtwo.co"
          git config user.name "Oliver SDR Bot"
          git add -A
          git diff --staged --quiet || git commit -m "prospects: weekly batch added"
          git push
