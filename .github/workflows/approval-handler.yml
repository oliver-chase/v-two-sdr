name: SDR Approval Handler

on:
  workflow_dispatch:
    inputs:
      draft_id:
        description: 'Draft ID to process'
        required: true
      action:
        description: 'approve or reject'
        required: true

concurrency:
  group: sdr-prospects-write
  cancel-in-progress: false

jobs:
  handle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Handle approval
        env:
          DRAFT_ID: ${{ inputs.draft_id }}
          ACTION: ${{ inputs.action }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/handle-approval.js

      - name: Commit and push changes
        run: |
          git config user.email "oliver@vtwo.co"
          git config user.name "Oliver SDR Bot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add -A
          git diff --staged --quiet || git commit -m "approval: ${{ inputs.action }} ${{ inputs.draft_id }}"
          git push

      - name: Trigger send workflow on approval
        if: ${{ inputs.action == 'approve' }}
        env:
          SDR_PAT: ${{ secrets.SDR_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          curl -s -X POST \
            "https://api.github.com/repos/${REPO}/actions/workflows/send-approved.yml/dispatches" \
            -H "Authorization: Bearer ${SDR_PAT}" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}'
