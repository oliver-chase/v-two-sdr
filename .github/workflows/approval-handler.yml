name: SDR Approval Handler

on:
  workflow_dispatch:
    inputs:
      draft_id:
        description: 'Draft ID to process'
        required: true
      action:
        description: 'approve or reject'
        required: true

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Handle approval
        env:
          DRAFT_ID: ${{ inputs.draft_id }}
          ACTION: ${{ inputs.action }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
        run: node scripts/handle-approval.js

      - name: Commit and push changes
        run: |
          git config user.email "oliver@vtwo.co"
          git config user.name "Oliver SDR Bot"
          git add -A
          git diff --staged --quiet || git commit -m "approval: ${{ inputs.action }} ${{ inputs.draft_id }}"
          git push

      - name: Trigger send workflow on approval
        if: ${{ inputs.action == 'approve' }}
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'send-approved.yml',
              ref: 'main'
            })
