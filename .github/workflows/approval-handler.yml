name: SDR Approval Handler

on:
  workflow_dispatch:
    inputs:
      draft_id:
        description: 'Draft ID to process'
        required: true
      action:
        description: 'approve or reject'
        required: true

jobs:
  handle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Echo inputs
        env:
          DRAFT_ID: ${{ inputs.draft_id }}
          ACTION: ${{ inputs.action }}
        run: echo "hello from approval-handler — draft=$DRAFT_ID action=$ACTION"

      - name: Commit and push changes
        run: |
          git config user.email "oliver@vtwo.co"
          git config user.name "Oliver SDR Bot"
          git add -A
          git diff --staged --quiet || git commit -m "approval: ${{ inputs.action }} ${{ inputs.draft_id }}"
          git push
